version: "3.8"

services:
  open-lovable:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SANDBOX_PROVIDER=coolify
      - COOLIFY_API=${COOLIFY_API}
      - COOLIFY_ADDRESS=${COOLIFY_ADDRESS}
      - COOLIFY_SANDBOX_AGENT_URL=http://sandbox:3001
      - COOLIFY_SANDBOX_VITE_URL=http://localhost:5173
    depends_on:
      - sandbox
    networks:
      - open-lovable-net

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    ports:
      - "3001:3001"
      - "5173:5173"
    environment:
      - PORT=3001
    networks:
      - open-lovable-net

networks:
  open-lovable-net:
    driver: bridge
